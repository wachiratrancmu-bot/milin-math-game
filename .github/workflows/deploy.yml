name: Deploy to GitHub Pages

# เผยแพร่อัตโนมัติทุกครั้งที่ push ขึ้น branch main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# ให้ deploy ทีละครั้ง ไม่ทับซ้อนกัน
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

      # เผยแพร่เนื้อหาที่ build แล้วไปยัง branch gh-pages
      - name: Publish to gh-pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
